name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Configuration python 3.11.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.9' 

      - name : Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name : Exécution des tests
        run: pytest --cov=. --cov-report=html --cov-report=term --cov-report=json

      - name: Extraction du pourcentage
        id: coverage
        run: |
          COVERAGE=$(python -c "import json;print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "percentage=$COVERAGE%" >> $GITHUB_OUTPUT

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
  
  report:
    name: Rapport de tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Affichage du resultat
        run: |
          echo "Couverture de code : ${{ needs.test.outputs.coverage }}"
      
      - name: Récupérer l'artéfact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
      - name: Lister les fichier
        run: ls

  build-push:
    name: build et push docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: connexion à docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build & push
        run: |
          docker build - t ${{ secrets.DOCKER_USERNAME }}/app_satisfaction .
          docker push ${{ secrets.DOCKER_USERNAME }}/app_satisfaction